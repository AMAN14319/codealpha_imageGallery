<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>✨ Creative Image Gallery</h1>

    <div class="gallery">

        <div class="card">
            <img src="https://picsum.photos/id/1015/600/400" alt="">
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1018/600/400" alt="">
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1025/600/400" alt="">
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1035/600/400" alt="">
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1040/600/400" alt="">
        </div>

        <div class="card">
            <img src="https://picsum.photos/id/1060/600/400" alt="">
        </div>

    </div>

    <div id="lightbox">
        <span id="close">&times;</span>
        <button id="prev">&#10094;</button>
        <img id="lightbox-img">
        <button id="next">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
